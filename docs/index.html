<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hard Copy</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body>

  <!-- ============================================================
    HEADER
  ============================================================ -->
  <header class="header">
    <div class="header-inner">
      <div class="logo-wrap">
        <i class="bi bi-camera-reels" style="font-size: 28px; color: #f6ad55;"></i>
        <span class="logo-text">Hard Copy</span>
        </div>
      <div class="stat-badge" id="dvd-count">
        <!-- Filled in by JavaScript -->
        Loading...
      </div>
    </div>
  </header>

  <!-- ============================================================
    MAIN CONTENT
  ============================================================ -->
  <main class="main">

    <!-- ADD DVD FORM -->
    <section class="add-section">
      <h2 class="section-title">Add a DVD</h2>
      <div class="form-row">
        <input
          type="text"
          id="input-title"
          class="input"
          placeholder="Movie title"
          autocomplete="off"
        >
        <input
          type="text"
          id="input-location"
          class="input"
          placeholder="Where'd you get it?"
          autocomplete="off"
        >
        <button class="btn btn-primary" id="add-btn" onclick="handleAdd()">
          Add to Collection
        </button>
      </div>
      <!-- Status message shown after add attempt -->
      <div id="add-message" class="message hidden"></div>
    </section>

    <!-- SEARCH BAR -->
    <section class="search-section">
      <input
        type="text"
        id="input-search"
        class="input input-search"
        placeholder="Search your collection..."
        autocomplete="off"
        oninput="handleSearch(this.value)"
      >
    </section>

    <!-- DVD COLLECTION GRID -->
    <section class="collection-section">
      <div class="collection-header">
        <h2 class="section-title" id="collection-title">Collection</h2>
      </div>

      <!-- DVD cards are injected here by JavaScript -->
      <div class="dvd-grid" id="dvd-grid">
        <div class="loading">Loading your collection...</div>
      </div>
    </section>

  </main>

  <!-- ============================================================
    SCRIPTS — loaded at the bottom so HTML is ready first
    Order matters: api.js and utils.js must load before app.js
  ============================================================ -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
